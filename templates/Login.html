<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
</head>

<body>

    <h1>Secure Login System</h1>

    <form method="POST">

        <input
            type="text"
            name="username"
            placeholder="Enter Username"
            required
        >

        <br><br>

        <input
            type="password"
            name="password"
            placeholder="Enter Password"
            required
        >

        <br><br>

        <button type="submit">
            Login
        </button>

    </form>

    <br>

    <a href="/register">
        Create New Account
    </a>

</body>
</html>
