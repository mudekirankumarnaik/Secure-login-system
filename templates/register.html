<!DOCTYPE html>
<html>
<head>
    <title>Register</title>
</head>

<body>

    <h1>User Registration</h1>

    <form method="POST">

        <input
            type="text"
            name="username"
            placeholder="Enter Username"
            required
        >

        <br><br>

        <input
            type="password"
            name="password"
            placeholder="Enter Password"
            required
        >

        <br><br>

        <button type="submit">
            Register
        </button>

    </form>

    <br>

    <a href="/login">
        Already have account? Login
    </a>

</body>
</html>
